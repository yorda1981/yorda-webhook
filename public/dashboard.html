<script>

// =========================
// AUTH
// =========================
const auth =

  localStorage.getItem(
    "adminAuth"
  );

if (!auth) {

  window.location =
    "/login.html";
}

// =========================
// LOGOUT
// =========================
function logout() {

  localStorage.removeItem(
    "adminAuth"
  );

  window.location =
    "/login.html";
}

// =========================
// LOAD STATS
// =========================
async function cargarStats() {

  try {

    const req =
      await fetch(
        "/admin/stats"
      );

    const data =
      await req.json();

    document
    .getElementById(
      "clientes"
    )
    .innerText =

      data.clientes || 0;

    document
    .getElementById(
      "vip"
    )
    .innerText =

      data.vip || 0;

    document
    .getElementById(
      "ops"
    )
    .innerText =

      data.operaciones || 0;

    document
    .getElementById(
      "total"
    )
    .innerText =

      "R$" +

      (
        data.total || 0
      );

  } catch (e) {

    console.log(e);
  }
}

// =========================
// LOAD TASAS
// =========================
async function cargarTasas() {

  try {

    const req =
      await fetch(
        "/admin/tasas"
      );

    const data =
      await req.json();

    document
    .getElementById(
      "brl1"
    )
    .value =

      data
      .brl_cup
      .faixas[1]
      .tasa;

    document
    .getElementById(
      "brl2"
    )
    .value =

      data
      .brl_cup
      .faixas[2]
      .tasa;

    document
    .getElementById(
      "usd1"
    )
    .value =

      data
      .usd_clasica
      .tasa;

    document
    .getElementById(
      "usd2"
    )
    .value =

      data
      .usd_prepago
      .tasa;

  } catch (e) {

    console.log(e);
  }
}

// =========================
// SAVE TASAS
// =========================
async function guardarTasas() {

  try {

    const body = {

      brl1:

        document
        .getElementById(
          "brl1"
        )
        .value,

      brl2:

        document
        .getElementById(
          "brl2"
        )
        .value,

      usd1:

        document
        .getElementById(
          "usd1"
        )
        .value,

      usd2:

        document
        .getElementById(
          "usd2"
        )
        .value
    };

    const req =

      await fetch(

        "/admin/tasas",

        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"
          },

          body:
            JSON.stringify(
              body
            )
        }
      );

    const data =
      await req.json();

    document
    .getElementById(
      "status"
    )
    .innerText =

      data.message ||

      "Tasas actualizadas";

    // RECARGAR TASAS
    cargarTasas();

  } catch (e) {

    console.log(e);
  }
}

// =========================
// INIT
// =========================
cargarStats();

cargarTasas();

</script>
