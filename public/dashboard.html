<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Dashboard</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<script>

const auth =

  localStorage.getItem(
    "adminAuth"
  );

if (!auth) {

  window.location =
    "/login.html";
}

</script>

<div class="dashboard">

<h1>
📊 Dashboard YordaBot
</h1>

<div class="cards">

<div class="card">

<h2>Clientes</h2>

<p id="clientes">
0
</p>

</div>

<div class="card">

<h2>VIP</h2>

<p id="vip">
0
</p>

</div>

<div class="card">

<h2>Operaciones</h2>

<p id="ops">
0
</p>

</div>

<div class="card">

<h2>Total Enviado</h2>

<p id="total">
R$0
</p>

</div>

</div>

<!-- ===================== -->
<!-- TASAS -->
<!-- ===================== -->

<h2>
⚙️ Tasas
</h2>

<div class="card">

<label>
BRL 100-499
</label>

<input
id="brl1"
type="number"
value="124"
/>

<br><br>

<label>
BRL 500+
</label>

<input
id="brl2"
type="number"
value="126"
/>

<br><br>

<label>
USD Clásica
</label>

<input
id="usd1"
type="number"
step="0.01"
value="5.60"
/>

<br><br>

<label>
USD Prepago
</label>

<input
id="usd2"
type="number"
step="0.01"
value="5.40"
/>

<br><br>

<button onclick="guardarTasas()">

Guardar Tasas

</button>

<p id="status"></p>

</div>

<br>

<button onclick="logout()">

Salir

</button>

</div>

<script>

// =========================
// LOGOUT
// =========================
function logout() {

  localStorage.removeItem(
    "adminAuth"
  );

  window.location =
    "/login.html";
}

// =========================
// LOAD STATS
// =========================
async function cargarStats() {

  try {

    const req =
      await fetch(
        "/admin/stats"
      );

    const data =
      await req.json();

    document
    .getElementById(
      "clientes"
    )
    .innerText =

      data.clientes || 0;

    document
    .getElementById(
      "vip"
    )
    .innerText =

      data.vip || 0;

    document
    .getElementById(
      "ops"
    )
    .innerText =

      data.operaciones || 0;

    document
    .getElementById(
      "total"
    )
    .innerText =

      "R$" +

      (
        data.total || 0
      );

  } catch (e) {

    console.log(e);
  }
}

// =========================
// GUARDAR TASAS
// =========================
async function guardarTasas() {

  try {

    const body = {

      brl1:

        document
        .getElementById(
          "brl1"
        )
        .value,

      brl2:

        document
        .getElementById(
          "brl2"
        )
        .value,

      usd1:

        document
        .getElementById(
          "usd1"
        )
        .value,

      usd2:

        document
        .getElementById(
          "usd2"
        )
        .value
    };

    const req =

      await fetch(

        "/admin/tasas",

        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"
          },

          body:
            JSON.stringify(
              body
            )
        }
      );

    const data =
      await req.json();

    document
    .getElementById(
      "status"
    )
    .innerText =

      data.message ||

      "Tasas actualizadas";

  } catch (e) {

    console.log(e);
  }
}

// =========================
// INIT
// =========================
cargarStats();

</script>

</body>
</html>
