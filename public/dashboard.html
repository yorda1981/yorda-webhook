<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YORDA-BOT | Premium Admin</title>
    <style>
        :root { --bg: #0b0e1a; --card: #161b33; --accent: #7c4dff; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2d355a; }
        .stat-card span { font-size: 12px; color: #8b949e; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0; color: var(--accent); }
        .config-section { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #2d355a; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input { background: #0b0e1a; border: 1px solid #2d355a; padding: 12px; border-radius: 10px; color: white; font-size: 16px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 YORDA-BOT Admin</h1>
            <div style="background: #1a2733; color: #4ade80; padding: 5px 15px; border-radius: 20px; font-size: 12px;">● En línea</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span>Clientes</span><h2 id="stat-clientes">0</h2></div>
            <div class="stat-card"><span>VIP</span><h2 id="stat-vip">0</h2></div>
            <div class="stat-card"><span>Operaciones</span><h2 id="stat-ops">0</h2></div>
            <div class="stat-card"><span>Volumen Total</span><h2 id="stat-vol">R$ 0</h2></div>
        </div>

        <div class="config-section">
            <h3>💱 Tasas BRL → CUP</h3>
            <div class="grid-inputs">
                <div class="input-group"><label>Menos de 100 BRL</label><input type="number" id="brl_0"></div>
                <div class="input-group"><label>100 - 499 BRL</label><input type="number" id="brl_100"></div>
                <div class="input-group"><label>500 - 999 BRL</label><input type="number" id="brl_500"></div>
                <div class="input-group"><label>1000+ BRL</label><input type="number" id="brl_1000"></div>
            </div>
            <h3 style="margin-top: 30px;">💵 Tasas USD</h3>
            <div class="grid-inputs">
                <div class="input-group"><label>USD Clásica</label><input type="number" step="0.01" id="usd1"></div>
                <div class="input-group"><label>USD Prepago</label><input type="number" step="0.01" id="usd2"></div>
            </div>
            <button class="btn-save" onclick="guardar()">Guardar Configuración</button>
        </div>
    </div>

    <script>
        async function init() {
            const resT = await fetch("/admin/tasas");
            const t = await resT.json();
            document.getElementById("brl_0").value = t.brl_0;
            document.getElementById("brl_100").value = t.brl_100;
            document.getElementById("brl_500").value = t.brl_500;
            document.getElementById("brl_1000").value = t.brl_1000;
            document.getElementById("usd1").value = t.usd1;
            document.getElementById("usd2").value = t.usd2;

            const resS = await fetch("/admin/stats");
            const s = await resS.json();
            document.getElementById("stat-clientes").innerText = s.clientes;
            document.getElementById("stat-ops").innerText = s.operaciones;
            document.getElementById("stat-vol").innerText = `R$ ${s.total.toLocaleString('pt-BR')}`;
        }

        async function guardar() {
            const data = {
                brl_0: Number(document.getElementById("brl_0").value),
                brl_100: Number(document.getElementById("brl_100").value),
                brl_500: Number(document.getElementById("brl_500").value),
                brl_1000: Number(document.getElementById("brl_1000").value),
                usd1: Number(document.getElementById("usd1").value),
                usd2: Number(document.getElementById("usd2").value)
            };
            await fetch("/admin/tasas", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            alert("✅ Tasas actualizadas");
            init();
        }
        init();
    </script>
</body>
</html>
