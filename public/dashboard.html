```html
<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    YORDA-BOT Dashboard
  </title>

  <link
    rel="stylesheet"
    href="/styles.css"
  >

</head>

<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        YORDA-BOT
      </div>

      <div class="menu">

        <button>
          Dashboard
        </button>

        <button>
          Clientes
        </button>

        <button>
          Operaciones
        </button>

        <button>
          Tasas
        </button>

        <button>
          Logs
        </button>

        <button onclick="logout()">
          Logout
        </button>

      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <h1 class="title">
        Dashboard Admin
      </h1>

      <!-- STATS -->
      <div class="stats-grid">

        <div class="card">

          <h2>
            Mensajes Hoy
          </h2>

          <p id="msgHoy">
            0
          </p>

        </div>

        <div class="card">

          <h2>
            Operaciones
          </h2>

          <p id="opsHoy">
            0
          </p>

        </div>

        <div class="card">

          <h2>
            Clientes
          </h2>

          <p id="clientesHoy">
            0
          </p>

        </div>

        <div class="card">

          <h2>
            Conversión
          </h2>

          <p id="conversion">
            0%
          </p>

        </div>

      </div>

      <!-- TASAS -->
      <div class="tasas-box">

        <h2
          style="
            margin-bottom:20px;
          "
        >
          Configuración de Tasas
        </h2>

        <!-- BRL -->
        <div class="input-group">

          <label>
            BRL → CUP
          </label>

          <input
            type="number"
            id="brlCup"
          >

        </div>

        <!-- USD -->
        <div class="input-group">

          <label>
            USD → CUP
          </label>

          <input
            type="number"
            id="usdCup"
          >

        </div>

        <!-- SAVE -->
        <button
          class="save-btn"
          onclick="guardarTasas()"
        >
          Guardar Tasas
        </button>

      </div>

    </main>

  </div>

  <script>

    // =====================
    // LOGIN SIMPLE
    // =====================
    const password =
      prompt(
        "Ingrese contraseña admin"
      );

    if (
      password !==
      "admin123"
    ) {

      alert(
        "Acceso denegado"
      );

      window.location.href =
        "/";
    }

    // =====================
    // CARGAR STATS
    // =====================
    async function cargarStats() {

      try {

        const req =
          await fetch(
            "/admin/stats"
          );

        const data =
          await req.json();

        document.getElementById(
          "msgHoy"
        ).innerText =
          data.messages || 0;

        document.getElementById(
          "opsHoy"
        ).innerText =
          data.operations || 0;

        document.getElementById(
          "clientesHoy"
        ).innerText =
          data.clients || 0;

        document.getElementById(
          "conversion"
        ).innerText =
          `${data.conversion || 0}%`;

      } catch (e) {

        console.log(e);
      }
    }

    // =====================
    // CARGAR TASAS
    // =====================
    async function cargarTasas() {

      try {

        const req =
          await fetch(
            "/admin/tasas"
          );

        const data =
          await req.json();

        document.getElementById(
          "brlCup"
        ).value =
          data.brlCup || 0;

        document.getElementById(
          "usdCup"
        ).value =
          data.usdCup || 0;

      } catch (e) {

        console.log(e);
      }
    }

    // =====================
    // GUARDAR TASAS
    // =====================
    async function guardarTasas() {

      try {

        const body = {

          brlCup:
            Number(
              document.getElementById(
                "brlCup"
              ).value
            ),

          usdCup:
            Number(
              document.getElementById(
                "usdCup"
              ).value
            )
        };

        const req =
          await fetch(
            "/admin/tasas",
            {

              method:
                "POST",

              headers: {

                "Content-Type":
                  "application/json"
              },

              body:
                JSON.stringify(
                  body
                )
            }
          );

        const data =
          await req.json();

        alert(
          "✅ Tasas actualizadas"
        );

        console.log(data);

      } catch (e) {

        console.log(e);

        alert(
          "❌ Error guardando tasas"
        );
      }
    }

    // =====================
    // LOGOUT
    // =====================
    function logout() {

      location.reload();
    }

    // =====================
    // INIT
    // =====================
    cargarStats();

    cargarTasas();

  </script>

</body>
</html>
```
