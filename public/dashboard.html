<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YORDA-BOT | Premium Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e1a; --card: #161b33; --accent: #7c4dff; --text: #ffffff; --red: #ef4444; --green: #4ade80; --yellow: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-badge { background: #1a2733; color: var(--green); padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 700; border: 1px solid #2d355a; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #2d355a; }
        .stat-card span { font-size: 12px; color: #8b949e; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .stat-card h2 { margin: 10px 0 0; color: var(--accent); font-size: 28px; }

        .config-section { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #2d355a; margin-bottom: 30px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #8b949e; font-size: 12px; border-bottom: 2px solid #2d355a; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #2d355a; font-size: 14px; }

        .btn-confirm { background: var(--green); color: #0b0e1a; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-confirm:hover { transform: scale(1.05); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input { background: #0b0e1a; border: 1px solid #2d355a; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

            <h1>🤖 YORDA-BOT Admin</h1>
            <div class="status-badge">● Sistema Online</div>
        </div>

            <div class="stat-card"><span>Pendentes</span><h2 id="stat-pend" style="color: var(--yellow);">0</h2></div>
        </div>
