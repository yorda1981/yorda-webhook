<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Login Admin</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="login-box">

<h1>YordaBot Admin</h1>

<input
type="text"
id="user"
placeholder="Usuário"
/>

<input
type="password"
id="pass"
placeholder="Senha"
/>

<button onclick="login()">

Entrar

</button>

<p id="msg"></p>

</div>

<script>

function login() {

  const user =

    document
    .getElementById("user")
    .value;

  const pass =

    document
    .getElementById("pass")
    .value;

  if (

    user === "admin"

    &&

    pass === "yorda123"
  ) {

    localStorage.setItem(
      "adminAuth",
      "true"
    );

    window.location =
      "/dashboard.html";

  } else {

    document
    .getElementById("msg")
    .innerText =

      "Login inválido";
  }
}

</script>

</body>
</html>
