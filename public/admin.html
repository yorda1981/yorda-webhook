<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>YordaBot Admin</title>

<style>

body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 30px;
}

.card {
  background: #1d1d1d;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #00c853;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>YordaBot Admin</h1>

<h2>BRL → CUP</h2>

<label>100–499</label>

<input
id="taxa1"
type="number"
value="124"
/>

<label>500+</label>

<input
id="taxa2"
type="number"
value="126"
/>

<h2>USD Clásica</h2>

<input
id="usd1"
type="number"
step="0.01"
value="5.60"
/>

<h2>USD Prepago</h2>

<input
id="usd2"
type="number"
step="0.01"
value="5.75"
/>

<button onclick="guardar()">

Guardar Cambios

</button>

</div>

<script>

async function guardar() {

  const data = {

    brl1:
      Number(
        document
        .getElementById("taxa1")
        .value
      ),

    brl2:
      Number(
        document
        .getElementById("taxa2")
        .value
      ),

    usd1:
      Number(
        document
        .getElementById("usd1")
        .value
      ),

    usd2:
      Number(
        document
        .getElementById("usd2")
        .value
      )
  };

  const req =
    await fetch(

      "/admin/tasas",

      {

        method: "POST",

        headers: {

          "Content-Type":
            "application/json"
        },

        body:
          JSON.stringify(data)
      }
    );

  const res =
    await req.json();

  alert(res.message);
}

</script>

</body>
</html>
